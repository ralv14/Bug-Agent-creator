name: 🐞 Reportar Bug
description: Sube tu evidencia (fotos, videos, logs) y el Bug Agent generará el reporte automáticamente.
labels: ["bug-agent"]
body:
  - type: markdown
    attributes:
      value: |
        ℹ️ **El título del bug será generado automáticamente por el agente.** 
        Solo necesitas llenar Entorno, Plataforma y subir tu evidencia.

  - type: dropdown
    id: environment
    attributes:
      label: 🌐 Entorno
      options:
        - Network
        - Cloud
        - Both
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 📱 Plataforma
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Descripción (opcional)
      description: Contexto del bug (qué pasó, dónde, cuándo, etc.)
      placeholder: Describe brevemente el problema...
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: 📎 Evidencia
      description: Arrastra aquí capturas, videos o logs. El agente los procesará automáticamente.
      placeholder: Arrastra tus archivos aquí (.png, .jpg, .mp4, .mov, .log, .txt)...
    validations:
      required: true