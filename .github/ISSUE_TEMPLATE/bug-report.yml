name: 🐞 Report Bug
description: Upload your evidence (screenshots, videos, logs) and the Bug Agent will generate the report automatically.
labels: ["bug-agent"]
body:
  - type: markdown
    attributes:
      value: |
        ℹ️ **The bug title will be generated automatically by the agent.** 
        Just fill in Environment, Platform, and upload your evidence.

  - type: dropdown
    id: environment
    attributes:
      label: 🌐 Environment
      options:
        - Network
        - Cloud
        - Both
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 📱 Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Description (optional)
      description: Context of the bug (what happened, where, when, etc.)
      placeholder: Briefly describe the problem...
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: 📎 Evidence
      description: Drag screenshots, videos, or logs here. The agent will process them automatically.
      placeholder: Drop your files here (.png, .jpg, .mp4, .mov, .log, .txt)...
    validations:
      required: true