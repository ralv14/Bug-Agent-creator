name: Approve and Upload to Trello

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  approve-and-upload:
    if: |
      contains(github.event.issue.labels.*.name, 'bug-agent') &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 📖 Read saved bug report
        id: read_report
        run: |
          REPORT_PATH=".bug-reports/issue-${{ github.event.issue.number }}-report.json"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "❌ Error: Bug report not found at $REPORT_PATH"
            echo "Did the generation workflow complete successfully?"
            exit 1
          fi
          mkdir -p ci-output
          cp "$REPORT_PATH" ci-output/bug-report.json
          echo "✅ Report loaded from repo"

      - name: Process issue and upload to Trello (without regenerating)
        id: upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: node scripts/upload-to-trello.js

      - name: 📊 Save metrics to repo
        if: always()
        run: |
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git add src/bug-agent-metrics.csv
          git commit -m "📊 log: bug metrics updated from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: 🧹 Cleanup temporary report file
        if: always()
        run: |
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git rm .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git commit -m "🤖 temp: cleanup report for issue #${{ github.event.issue.number }}" || echo "No cleanup needed"
          git push || echo "Push failed (might be already cleaned)"

      - name: Comment upload confirmation on the Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ Failed to upload to Trello (check the workflow logs).';
            try {
              comment = fs.readFileSync('ci-output/trello-upload-comment.txt', 'utf-8');
            } catch (e) {
              // use default message
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trello-upload-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore