name: Aprobar y Subir a Trello

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  approve-and-upload:
    if: |
      contains(github.event.issue.labels.*.name, 'bug-agent') &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 📖 Leer reporte generado del issue
        id: read_report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Obtener todos los comments del issue
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Buscar el comment con el JSON del reporte
            let bugReport = null;
            for (const comment of comments.data) {
              const match = comment.body.match(/<!-- BUG_AGENT_REPORT_JSON\n([\s\S]*?)\nEND_BUG_AGENT_REPORT_JSON -->/);
              if (match) {
                bugReport = JSON.parse(match[1]);
                break;
              }
            }
            
            if (!bugReport) {
              throw new Error('No se encontró el reporte generado. ¿Olvidaste esperar a que se genere?');
            }
            
            // Guardar el reporte para el siguiente paso
            fs.mkdirSync('ci-output', { recursive: true });
            fs.writeFileSync('ci-output/bug-report.json', JSON.stringify(bugReport, null, 2));

      - name: Procesar issue y subir a Trello (sin regenerar)
        id: upload
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: node scripts/upload-to-trello.js

      - name: 📊 Guardar métricas en el repo
        if: always()
        run: |
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git add src/bug-agent-metrics.csv
          git commit -m "📊 log: bug metrics updated from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Comentar confirmación de upload en el Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ Falló al subir a Trello (revisa los logs del workflow).';
            try {
              comment = fs.readFileSync('ci-output/trello-upload-comment.txt', 'utf-8');
            } catch (e) {
              // usa el mensaje default
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Subir reporte como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trello-upload-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore