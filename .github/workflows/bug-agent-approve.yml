name: Approve and Upload to Trello

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  approve-and-upload:
    if: |
      contains(github.event.issue.labels.*.name, 'bug-agent') &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Process issue and upload to Trello (without regenerating)
        id: upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          require('dotenv').config();
          const { uploadToTrello } = require('./src/trelloService');
          const { logMetric } = require('./src/metrics-logger');
          
          const issueNumber = ${{ github.event.issue.number }};
          const reportPath = path.join('.bug-reports', \`issue-\${issueNumber}-report.json\`);
          
          if (!fs.existsSync(reportPath)) {
            throw new Error('Bug report not found. Did the generation workflow complete successfully?');
          }
          
          const bugData = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
          const folder = path.join('test-data', \`issue-\${issueNumber}\`);
          
          // Get evidence files
          const mediaFiles = [];
          if (fs.existsSync(folder)) {
            const files = fs.readdirSync(folder);
            for (const file of files) {
              if (file.startsWith('evidence-')) {
                mediaFiles.push({
                  fileName: file,
                  localPath: path.join(folder, file),
                });
              }
            }
          }
          
          const startTime = Date.now();
          const generatedTime = Date.now();
          
          uploadToTrello(bugData, mediaFiles).then(card => {
            const uploadedTime = Date.now();
            logMetric(bugData.title, startTime, generatedTime, uploadedTime);
            
            const resultPath = path.join('ci-output');
            fs.mkdirSync(resultPath, { recursive: true });
            fs.writeFileSync(
              path.join(resultPath, 'trello-upload-comment.txt'),
              \`✅ Bug uploaded to Trello: [\${bugData.title}](\${card.shortUrl})\`
            );
            
            console.log('✅ Uploaded to Trello!');
          }).catch(err => {
            throw new Error('Failed to upload to Trello: ' + err.message);
          });
          "

      - name: 📊 Save metrics to repo
        if: always()
        run: |
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git add src/bug-agent-metrics.csv
          git commit -m "📊 log: bug metrics updated from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: 🧹 Cleanup temporary report file
        if: always()
        run: |
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git rm .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git commit -m "🤖 temp: cleanup report for issue #${{ github.event.issue.number }}" || echo "No cleanup needed"
          git push || echo "Push failed (might be already cleaned)"

      - name: Comment upload confirmation on the Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ Failed to upload to Trello (check the workflow logs).';
            try {
              comment = fs.readFileSync('ci-output/trello-upload-comment.txt', 'utf-8');
            } catch (e) {
              // use default message
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trello-upload-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore