name: Bug Agent desde Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  run-bug-agent:
    if: contains(github.event.issue.labels.*.name, 'bug-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Procesar issue y correr Bug Agent
        id: run_agent
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/run-from-issue.js --no-upload

      - name: Comentar reporte generado en el Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportContent = '❌ El Bug Agent no generó ningún resultado (revisa los logs del workflow).';
            let reportJson = '';
            try {
              reportContent = fs.readFileSync('ci-output/bug-report-comment.txt', 'utf-8');
              reportJson = fs.readFileSync('ci-output/bug-report.json', 'utf-8');
            } catch (e) {
              // usa el mensaje default
            }
            
            // Crear comment con reporte visible + JSON oculto
            const comment = reportContent + '\n\n<!-- BUG_AGENT_REPORT_JSON\n' + reportJson + '\nEND_BUG_AGENT_REPORT_JSON -->';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });


      - name: Subir reporte generado como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-report-issue-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore