name: Bug Agent desde Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  run-bug-agent:
    if: contains(github.event.issue.labels.*.name, 'bug-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Procesar issue y correr Bug Agent
        id: run_agent
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: node scripts/run-from-issue.js

      - name: Comentar resultado en el Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ El Bug Agent no generó ningún resultado (revisa los logs del workflow).';
            try {
              comment = fs.readFileSync('ci-output/comment.txt', 'utf-8');
            } catch (e) {
              // usa el mensaje default
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Subir reporte generado como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-report-issue-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore