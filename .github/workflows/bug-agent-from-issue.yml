name: Bug Agent from Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  run-bug-agent:
    if: contains(github.event.issue.labels.*.name, 'bug-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Process issue and run Bug Agent
        id: run_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/run-from-issue.js

      - name: 📋 Save bug report as JSON for approval workflow
        if: success()
        run: |
          mkdir -p .bug-reports
          cp ci-output/bug-report.json .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git add .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git commit -m "🤖 temp: bug report for issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      - name: Comment generated report on the Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportContent = '❌ The Bug Agent did not generate any result (check the workflow logs).';
            let reportJson = '';
            try {
              reportContent = fs.readFileSync('ci-output/bug-report-comment.txt', 'utf-8');
              reportJson = fs.readFileSync('ci-output/bug-report.json', 'utf-8');
            } catch (e) {
              // use default message
            }
            
            // Create comment with visible report + hidden JSON
            const comment = reportContent + '\n\n<!-- BUG_AGENT_REPORT_JSON\n' + reportJson + '\nEND_BUG_AGENT_REPORT_JSON -->';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });


      - name: Upload generated report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-report-issue-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore