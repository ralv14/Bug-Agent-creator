name: Regenerate Report

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  regenerate-report:
    if: |
      contains(github.event.issue.labels.*.name, 'bug-agent') &&
      contains(github.event.comment.body, '/regenerate')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate Bug Agent
        id: regenerate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/run-from-issue.js

      - name: 📋 Save regenerated bug report as JSON for approval workflow
        if: success()
        run: |
          mkdir -p .bug-reports
          cp ci-output/bug-report.json .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git config --global user.email "bug-agent@github.com"
          git config --global user.name "Bug Agent Bot"
          git add .bug-reports/issue-${{ github.event.issue.number }}-report.json
          git commit -m "🤖 temp: regenerated bug report for issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      - name: Comment new report on the Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ Failed to regenerate the report (check the workflow logs).';
            try {
              comment = fs.readFileSync('ci-output/bug-report-comment.txt', 'utf-8');
            } catch (e) {
              // use default message
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Upload regenerated report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-report-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore