name: Regenerar Reporte

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  regenerate-report:
    if: |
      contains(github.event.issue.labels.*.name, 'bug-agent') &&
      contains(github.event.comment.body, '/regenerate')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerar Bug Agent
        id: regenerate
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/run-from-issue.js --no-upload

      - name: Comentar nuevo reporte en el Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '❌ Falló al regenerar el reporte (revisa los logs del workflow).';
            try {
              comment = fs.readFileSync('ci-output/bug-report-comment.txt', 'utf-8');
            } catch (e) {
              // usa el mensaje default
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Subir reporte regenerado como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-report-${{ github.event.issue.number }}
          path: ci-output/bug-report.json
          if-no-files-found: ignore